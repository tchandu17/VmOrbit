# ─────────────────────────────────────────────────────────────────────────────
# VMOrbit — Prometheus Configuration
# ─────────────────────────────────────────────────────────────────────────────

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# ── Alerting ──────────────────────────────────────────────────────────────────
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# ── Rules ─────────────────────────────────────────────────────────────────────
rule_files:
  - "/etc/prometheus/rules/*.yml"

# ── Scrape Targets ────────────────────────────────────────────────────────────
scrape_configs:
  # VMOrbit Backend
  - job_name: "vmorbit-backend"
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8080"]
        labels:
          service: "vmorbit-backend"
          environment: "production"

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Node Exporter (if installed on host)
  # - job_name: "node"
  #   static_configs:
  #     - targets: ["host.docker.internal:9100"]
