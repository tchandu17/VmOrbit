# ─────────────────────────────────────────────────────────────────────────────
# VMOrbit — Production Configuration
#
# All secrets MUST be provided via environment variables (VMORBIT_ prefix).
# This file sets production-appropriate defaults for non-secret settings.
# Environment variables always override values in this file.
# ─────────────────────────────────────────────────────────────────────────────

server:
  port: 8080
  mode: release
  read_timeout: 15s
  write_timeout: 30s
  idle_timeout: 120s
  # CORS origins set via VMORBIT_SERVER_CORS_ORIGINS env var

database:
  host: postgres          # Docker service name
  port: 5432
  sslmode: disable        # Enable 'require' if using external managed DB with TLS
  max_open_conns: 50
  max_idle_conns: 15
  conn_max_lifetime: 5m

redis:
  host: redis             # Docker service name
  port: 6379
  db: 0
  pool_size: 20

jwt:
  access_token_ttl: 15m   # Short-lived in production
  refresh_token_ttl: 168h
  issuer: vmOrbit
  # secret set via VMORBIT_JWT_SECRET env var

providers:
  vmware:
    enabled: true
    default_timeout: 30s
    max_concurrent_conns: 3
  proxmox:
    enabled: true
    default_timeout: 30s
    verify_tls: true      # Enable TLS verification in production

task_engine:
  worker_count: 10
  queue_size: 1000
  max_retries: 3
  retry_base_delay: 5s
  task_ttl: 24h
  poll_interval: 5s
  lock_ttl: 300s
  max_log_entries: 500
  default_timeout: 10m

log:
  level: info
  format: json            # Structured JSON for log aggregation (ELK, Loki, etc.)

metrics:
  enabled: true
  path: /metrics
