version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: vmorbit_postgres
    environment:
      POSTGRES_USER: vmorbit
      POSTGRES_PASSWORD: vmorbit_secret
      POSTGRES_DB: vmorbit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vmorbit"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vmorbit_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
