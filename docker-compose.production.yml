version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# VMOrbit — Production Docker Compose
#
# Usage:
#   docker compose -f docker-compose.production.yml --env-file .env.production up -d
#
# Prerequisites:
#   - Copy .env.production.example → .env.production and fill in secrets
#   - Ensure ./nginx/ssl/ contains your TLS certificate and key
# ─────────────────────────────────────────────────────────────────────────────

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

services:
  # ── Reverse Proxy ────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: vmorbit_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging
    networks:
      - vmorbit_net

  # ── Backend API ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: production
    image: vmorbit/backend:${APP_VERSION:-latest}
    container_name: vmorbit_backend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      VMORBIT_SERVER_PORT: "8080"
      VMORBIT_SERVER_MODE: "release"
      VMORBIT_DATABASE_HOST: postgres
      VMORBIT_DATABASE_PORT: "5432"
      VMORBIT_REDIS_HOST: redis
      VMORBIT_REDIS_PORT: "6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging
    networks:
      - vmorbit_net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://vmorbit.example.com}
    image: vmorbit/frontend:${APP_VERSION:-latest}
    container_name: vmorbit_frontend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: "3001"
      HOSTNAME: "0.0.0.0"
      BACKEND_INTERNAL_URL: "http://backend:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 45s
    logging: *default-logging
    networks:
      - vmorbit_net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vmorbit_postgres
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_USER: ${DB_USER:-vmorbit}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-vmorbit}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres/init:/docker-entrypoint-initdb.d:ro
      - ./scripts/postgres/backup:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vmorbit} -d ${DB_NAME:-vmorbit}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging
    networks:
      - vmorbit_net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c maintenance_work_mem=64MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c work_mem=4MB
        -c min_wal_size=1GB
        -c max_wal_size=4GB
        -c wal_level=replica
        -c archive_mode=on
        -c archive_command='test ! -f /backups/wal/%f && cp %p /backups/wal/%f'
        -c log_min_duration_statement=1000
        -c log_checkpoints=on
        -c log_connections=on
        -c log_disconnections=on

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vmorbit_redis
    restart: unless-stopped
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --appendonly yes
        --appendfsync everysec
        --no-appendfsync-on-rewrite no
        --auto-aof-rewrite-percentage 100
        --auto-aof-rewrite-min-size 64mb
        --save 900 1
        --save 300 10
        --save 60 10000
        --maxmemory ${REDIS_MAX_MEMORY:-512mb}
        --maxmemory-policy allkeys-lru
        --loglevel notice
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging
    networks:
      - vmorbit_net
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "0.5"
        reservations:
          memory: 128M

  # ── Backup Service ────────────────────────────────────────────────────────────
  backup:
    image: postgres:16-alpine
    container_name: vmorbit_backup
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      PGPASSWORD: ${DB_PASSWORD}
      DB_HOST: postgres
      DB_USER: ${DB_USER:-vmorbit}
      DB_NAME: ${DB_NAME:-vmorbit}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - ./scripts/backup:/scripts:ro
      - backup_data:/backups
    entrypoint: ["/bin/sh", "/scripts/backup-entrypoint.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    logging: *default-logging
    networks:
      - vmorbit_net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backup_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  vmorbit_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
